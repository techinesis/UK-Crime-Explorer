[server]
# Lets the app serve files from a static/ directory at /app/static/<path>.
# Used by the Round 3 architecture: the colored per-filter GeoJSON files
# under static/colored/*.geojson are loaded by pydeck via URL so the 10MB
# geometry payload no longer ships through the WebSocket.
enableStaticServing = true

[theme]
# The dashboard is designed dark-mode-first. Pinning `base = "dark"` makes
# Streamlit's built-in components (markdown, dataframe, captions, inputs,
# selectboxes, etc.) render with dark-theme colours regardless of the
# user's OS-level preference, so the custom CSS in app.py and the
# component-level rules agree on every surface.
base = "dark"

# Slate palette (Tailwind's slate scale). Bright blue accent is used by
# Streamlit for radio dots, checkboxes, sliders, and link defaults.
primaryColor = "#60a5fa"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#f1f5f9"
